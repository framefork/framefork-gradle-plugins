name: Release using JReleaser

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next version after release (-SNAPSHOT will be added automatically)'
        required: true

env:
  GRADLE_OPTS: "-Dorg.gradle.console=plain -Dorg.gradle.daemon=false -Dorg.gradle.stacktrace=always"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Central is immutable — never release a SHA that gradle-build hasn't proven green. Checks are deliberately not re-run here.
      - name: Require green gradle-build for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/gradle-build.yml/runs?head_sha=${GITHUB_SHA}&per_page=1" --jq '.workflow_runs[0] // empty')
          if [ -z "$run" ]; then
            echo "::error::no gradle-build run exists for ${GITHUB_SHA} — push it and let CI finish first"
            exit 1
          fi
          status=$(jq -r '.status' <<<"$run")
          conclusion=$(jq -r '.conclusion' <<<"$run")
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::gradle-build for ${GITHUB_SHA} is status=${status} conclusion=${conclusion} — refusing to release"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build and publish to local
        run: ./gradlew publish -Pversion=${{ github.event.inputs.version }}

      - name: JReleaser full-release
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
        env:
          JRELEASER_STRICT: "true"
          JRELEASER_OUTPUT_DIRECTORY: "build/"
          JRELEASER_PROJECT_VERSION: ${{ github.event.inputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
          JRELEASER_GPG_KEYNAME: ${{ secrets.JRELEASER_GPG_KEYNAME }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}

      - name: JReleaser upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties

      - name: Update version in properties
        run: sed -i 's/^version=.*/version=${{ github.event.inputs.nextVersion }}-SNAPSHOT/g' gradle.properties

      - name: Commit & Push version update
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          message: "chore: bump version to ${{ github.event.inputs.nextVersion }}-SNAPSHOT"
          author_email: 'bot@framefork.org'
          author_name: 'Framefork BOT'
          branch: main
          tags: false
